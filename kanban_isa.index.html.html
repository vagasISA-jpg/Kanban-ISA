<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA — Kanban de Vagas 2026</title>
<style>
  :root{
    --navy:#004474; --navy2:#003360; --navy3:#e0eaf3; --navy4:#002a49;
    --cyan:#00D2D4; --cyan2:#00aaac; --cyan3:#e0fafa;
    --pink:#ED1E79; --pink2:#c01862; --pink3:#fde8f2;
    --gray1:#f7f7f7; --gray2:#ebebeb; --gray3:#aaa; --gray4:#555; --gray5:#333;
    --white:#fff; --radius:9px; --shadow:0 1px 4px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
  body{background:var(--gray1);color:var(--gray5);min-height:100vh;}

  /* ── TOP BAR ── */
  .topbar{background:var(--navy);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:200;}
  .logo{display:flex;align-items:center;gap:8px;}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);}
  .logo-dot2{width:10px;height:10px;border-radius:50%;background:var(--pink);}
  .logo h1{font-size:15px;font-weight:600;color:var(--white);letter-spacing:.3px;}
  .tabs{display:flex;gap:2px;margin-left:auto;}
  .tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.65);transition:all .15s;}
  .tab:hover{color:var(--white);}
  .tab.active{background:rgba(255,255,255,.15);color:var(--white);}
  .updated{font-size:11px;color:rgba(255,255,255,.4);margin-left:8px;}

  /* ── PAGES ── */
  .page{display:none;padding:1.25rem 1.5rem;}
  .page.active{display:block;}

  /* ── DASHBOARD ── */
  .dash-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px;}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;}
  .metric{background:var(--white);border-radius:var(--radius);padding:1rem 1.1rem;box-shadow:var(--shadow);}
  .metric-label{font-size:11px;color:var(--gray3);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
  .metric-val{font-size:28px;font-weight:700;line-height:1;margin-bottom:2px;}
  .metric-sub{font-size:11px;color:var(--gray3);}
  .mv-total{color:var(--navy);}
  .mv-open{color:var(--cyan2);}
  .mv-closed{color:var(--pink);}
  .mv-frozen{color:var(--gray3);}
  .mv-sla{color:#f59e0b;}

  .dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .dash-row.three{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:700px){.dash-row,.dash-row.three{grid-template-columns:1fr;}}

  .chart-card{background:var(--white);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow);}
  .chart-card h3{font-size:12px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}

  /* bar charts */
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .bar-label{font-size:11px;color:var(--gray4);min-width:90px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:14px;background:var(--gray2);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width .4s;}
  .bar-num{font-size:11px;color:var(--gray4);min-width:22px;text-align:left;}

  /* funnel */
  .funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .funnel-stage{font-size:11px;color:var(--gray4);min-width:130px;}
  .funnel-bar-wrap{flex:1;display:flex;align-items:center;gap:6px;}
  .funnel-bar{height:16px;border-radius:4px;min-width:4px;transition:width .4s;}
  .funnel-n{font-size:11px;color:var(--gray4);}

  /* SLA table */
  .sla-table{width:100%;border-collapse:collapse;font-size:12px;}
  .sla-table th{text-align:left;font-size:10px;color:var(--gray3);text-transform:uppercase;letter-spacing:.4px;padding:4px 6px;border-bottom:1px solid var(--gray2);}
  .sla-table td{padding:5px 6px;border-bottom:1px solid var(--gray2);color:var(--gray5);}
  .sla-table tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
  .pill-ok{background:#d1fae5;color:#065f46;}
  .pill-warn{background:#fef3c7;color:#92400e;}
  .pill-bad{background:#fee2e2;color:#991b1b;}

  /* resp donut-like */
  .resp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .resp-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
  .av-a{background:var(--cyan2);}
  .av-r{background:var(--pink);}
  .resp-info{flex:1;}
  .resp-name{font-size:12px;font-weight:500;color:var(--gray5);}
  .resp-sub{font-size:10px;color:var(--gray3);}
  .resp-track{flex:2;height:10px;background:var(--gray2);border-radius:4px;overflow:hidden;}
  .resp-fill{height:100%;border-radius:4px;}
  .rf-a{background:var(--cyan2);}
  .rf-r{background:var(--pink);}
  .resp-pct{font-size:11px;color:var(--gray4);min-width:30px;text-align:right;}

  /* ── KANBAN ── */
  .kb-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
  .kb-toolbar h2{font-size:14px;font-weight:600;color:var(--navy);margin-right:auto;}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--gray2);background:var(--white);font-size:11px;color:var(--gray4);cursor:pointer;font-weight:500;transition:all .15s;}
  .filter-btn:hover{border-color:var(--cyan);color:var(--navy);}
  .filter-btn.active{background:var(--navy);border-color:var(--navy);color:var(--white);}
  .add-vaga-btn{padding:6px 14px;border-radius:6px;background:var(--cyan);border:none;color:var(--white);font-size:12px;font-weight:600;cursor:pointer;}
  .add-vaga-btn:hover{background:var(--cyan2);}

  .kb-wrap{overflow-x:auto;padding-bottom:1rem;}
  .kb-cols{display:flex;gap:10px;min-width:900px;}
  .kb-col{flex:1;min-width:168px;display:flex;flex-direction:column;gap:6px;}
  .kb-col-head{border-radius:8px 8px 0 0;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
  .kh0{background:var(--pink2);}
  .kh1{background:var(--cyan2);}
  .kh2{background:#7c3aed;}
  .kh3{background:#059669;}
  .kh4{background:var(--gray4);}
  .kb-col-title{font-size:11px;font-weight:600;color:#fff;line-height:1.3;}
  .kb-col-count{font-size:10px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.2);border-radius:10px;padding:1px 7px;}
  .kb-cards{display:flex;flex-direction:column;gap:5px;min-height:60px;padding:3px 0;}
  .kb-card{background:var(--white);border-radius:0 8px 8px 0;padding:9px 11px;cursor:grab;user-select:none;box-shadow:var(--shadow);}
  .kb-card:active{cursor:grabbing;}
  .kb-card.dragging{opacity:.3;}
  .kc0{border-left:3px solid var(--pink);}
  .kc1{border-left:3px solid var(--cyan);}
  .kc2{border-left:3px solid #7c3aed;}
  .kc3{border-left:3px solid #059669;}
  .kc4{border-left:3px solid var(--gray3);opacity:.75;}
  .card-title{font-size:11px;font-weight:600;color:var(--gray5);line-height:1.35;margin-bottom:6px;}
  .card-dets{display:flex;flex-direction:column;gap:2px;margin-bottom:6px;}
  .card-dr{display:flex;gap:4px;font-size:10px;color:var(--gray3);line-height:1.4;align-items:flex-start;}
  .card-ico{font-size:10px;flex-shrink:0;width:13px;}
  .card-badges{display:flex;flex-wrap:wrap;gap:3px;}
  .badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600;}
  .b-area{background:var(--navy3);color:var(--navy4);}
  .b-resp{background:var(--gray2);color:var(--gray4);}
  .b-nova{background:var(--cyan3);color:var(--cyan2);}
  .b-sub{background:var(--pink3);color:var(--pink2);}
  .b-clt{background:#f0f0f0;color:#555;}
  .b-pj{background:#fff7ed;color:#c2410c;}
  .b-qt{background:var(--navy3);color:var(--navy4);}
  .card-obs{font-size:9px;color:var(--pink2);background:var(--pink3);border-radius:4px;padding:2px 6px;margin-top:4px;}
  .sla-warn{font-size:9px;color:#92400e;background:#fef3c7;border-radius:4px;padding:2px 6px;margin-top:4px;}
  .dz{border:1.5px dashed var(--cyan);border-radius:8px;height:40px;display:none;align-items:center;justify-content:center;font-size:10px;color:var(--cyan);}
  .dz.on{display:flex;}
  .add-card-btn{width:100%;background:none;border:1px dashed var(--gray2);border-radius:8px;padding:7px;font-size:11px;color:var(--gray3);cursor:pointer;margin-top:2px;transition:all .15s;}
  .add-card-btn:hover{border-color:var(--cyan);color:var(--navy);}

  /* ── MODAL ── */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--white);border-radius:12px;padding:1.5rem;width:440px;max-width:100%;}
  .modal-header{border-bottom:2px solid var(--cyan);padding-bottom:.75rem;margin-bottom:1rem;}
  .modal-header h3{font-size:14px;font-weight:600;color:var(--navy);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .form-row{display:flex;flex-direction:column;gap:3px;}
  .form-row.full{grid-column:1/-1;}
  .form-row label{font-size:10px;color:var(--gray3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
  .form-row input,.form-row select{font-size:12px;padding:6px 8px;border:1px solid var(--gray2);border-radius:6px;outline:none;color:var(--gray5);}
  .form-row input:focus,.form-row select:focus{border-color:var(--cyan);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:.75rem;border-top:1px solid var(--gray2);}
  .btn-cancel{background:none;border:1px solid var(--gray2);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--gray4);}
  .btn-save{background:var(--navy);border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;color:#fff;font-weight:600;}
  .btn-save:hover{background:var(--navy2);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-dot2"></div>
    <h1>ISA · Vagas 2026</h1>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('kanban')">Kanban</button>
    <button class="tab" onclick="showPage('dashboard')">Dashboard</button>
  </div>
  <span class="updated" id="updated-at"></span>
</div>

<!-- KANBAN PAGE -->
<div class="page active" id="page-kanban">
  <div class="kb-toolbar">
    <h2>Pipeline de Vagas</h2>
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('Amanda',this)">Amanda</button>
    <button class="filter-btn" onclick="setFilter('Rafaela',this)">Rafaela</button>
    <button class="add-vaga-btn" onclick="openModal(0)">+ Nova vaga</button>
  </div>
  <div class="kb-wrap">
    <div class="kb-cols" id="board"></div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div class="page" id="page-dashboard">
  <div class="dash-title">Indicadores de Recrutamento · 2026</div>

  <div class="metrics" id="metrics"></div>

  <div class="dash-row">
    <div class="chart-card">
      <h3>Vagas por área</h3>
      <div id="chart-area"></div>
    </div>
    <div class="chart-card">
      <h3>Funil por etapa (vagas abertas)</h3>
      <div id="chart-funnel"></div>
    </div>
  </div>

  <div class="dash-row">
    <div class="chart-card">
      <h3>SLA de fechamento (vagas encerradas)</h3>
      <div id="chart-sla"></div>
    </div>
    <div class="chart-card">
      <h3>Distribuição por responsável</h3>
      <div id="chart-resp"></div>
    </div>
  </div>

  <div class="dash-row">
    <div class="chart-card">
      <h3>Vagas abertas por mês</h3>
      <div id="chart-month"></div>
    </div>
    <div class="chart-card">
      <h3>CLT vs PJ</h3>
      <div id="chart-ct"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title">Nova vaga</h3></div>
    <div class="form-grid">
      <div class="form-row full"><label>Cargo / Vaga</label><input id="f-vaga" type="text" placeholder="Ex: Analista Pleno"></div>
      <div class="form-row"><label>Área</label><input id="f-area" type="text" placeholder="Ex: Saúde"></div>
      <div class="form-row"><label>Responsável</label>
        <select id="f-resp"><option>Amanda</option><option>Rafaela</option></select>
      </div>
      <div class="form-row"><label>Unidade</label><input id="f-unidade" type="text" placeholder="Ex: Paulista"></div>
      <div class="form-row"><label>Cidade</label><input id="f-cidade" type="text" placeholder="Ex: São Paulo"></div>
      <div class="form-row"><label>Gestor</label><input id="f-gestor" type="text"></div>
      <div class="form-row"><label>Diretor</label><input id="f-diretor" type="text"></div>
      <div class="form-row"><label>Qtd. vagas</label><input id="f-quant" type="number" value="1" min="1"></div>
      <div class="form-row"><label>Tipo</label>
        <select id="f-tipo"><option>Nova</option><option>Substituição</option></select>
      </div>
      <div class="form-row"><label>Contratação</label>
        <select id="f-ct"><option>CLT</option><option>PJ</option></select>
      </div>
      <div class="form-row"><label>Data abertura</label><input id="f-abertura" type="date"></div>
      <div class="form-row"><label>Justificativa</label><input id="f-just" type="text"></div>
      <div class="form-row full"><label>Observações</label><input id="f-obs" type="text"></div>
      <div class="form-row full"><label>Etapa inicial</label>
        <select id="f-etapa">
          <option value="0">Divulgação / Hunting</option>
          <option value="1">Entrevista G&G</option>
          <option value="2">Avaliação Técnica</option>
          <option value="3">Proposta e Contratação</option>
          <option value="4">Fechadas / Congeladas</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveCard()">Salvar vaga</button>
    </div>
  </div>
</div>

let nextId=cards.length+1, drag=null, filterResp='todos';

// ── UTILS ──
function fd(s){if(!s)return '';try{const d=new Date(s+'T00:00:00');return isNaN(d)?'':d.toLocaleDateString('pt-BR');}catch(e){return '';}}
function diffDays(a,b){if(!a||!b)return null;try{return Math.round((new Date(b)-new Date(a))/86400000);}catch(e){return null;}}
function today(){return new Date().toISOString().slice(0,10);}
function daysOpen(c){if(c.fechamento)return diffDays(c.abertura,c.fechamento);return diffDays(c.abertura,today());}

// ── PAGE SWITCH ──
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='dashboard') renderDash();
}

// ── FILTER ──
function setFilter(v,btn){
  filterResp=v;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderKanban();
}

function visibleCards(){
  if(filterResp==='todos') return cards;
  return cards.filter(c=>c.responsavel===filterResp);
}

// ── KANBAN ──
function slaWarn(c){
  if(c.col===4) return '';
  const d=daysOpen(c);
  if(d===null) return '';
  if(d>45) return `<div class="sla-warn">⚠ ${d} dias em aberto</div>`;
  if(d>30) return `<div class="sla-warn">🕐 ${d} dias em aberto</div>`;
  return '';
}

function cardHTML(c){
  const ab=fd(c.abertura),fc=fd(c.fechamento);
  return `<div class="kb-card ${COLS[c.col].lc}" draggable="true" data-id="${c.id}">
    <div class="card-title">${c.vaga}</div>
    <div class="card-dets">
      ${ab?`<div class="card-dr"><span class="card-ico">📅</span><span>Abertura: ${ab}</span></div>`:''}
      ${fc?`<div class="card-dr"><span class="card-ico">✅</span><span>Fechamento: ${fc}</span></div>`:''}
      ${c.unidade?`<div class="card-dr"><span class="card-ico">📍</span><span>${c.unidade}${c.cidade&&c.cidade!==c.unidade?' — '+c.cidade:''}</span></div>`:''}
      ${c.gestor?`<div class="card-dr"><span class="card-ico">👤</span><span>Gestor: ${c.gestor}</span></div>`:''}
      ${c.justificativa?`<div class="card-dr"><span class="card-ico">📝</span><span>${c.justificativa}</span></div>`:''}
    </div>
    <div class="card-badges">
      ${c.area?`<span class="badge b-area">${c.area}</span>`:''}
      <span class="badge b-resp">${c.responsavel}</span>
      ${c.tipo==='Nova'?'<span class="badge b-nova">Nova</span>':c.tipo==='Substituição'?'<span class="badge b-sub">Subst.</span>':''}
      ${c.contratacao==='CLT'?'<span class="badge b-clt">CLT</span>':c.contratacao==='PJ'?'<span class="badge b-pj">PJ</span>':''}
      ${c.quant>1?`<span class="badge b-qt">${c.quant} vagas</span>`:''}
    </div>
    ${c.obs?`<div class="card-obs">${c.obs}</div>`:''}
    ${slaWarn(c)}
  </div>`;
}

function renderKanban(){
  const b=document.getElementById('board');
  b.innerHTML='';
  const vis=visibleCards();
  COLS.forEach((col,ci)=>{
    const cs=vis.filter(c=>c.col===ci);
    const d=document.createElement('div');
    d.className='kb-col';
    d.innerHTML=`
      <div class="kb-col-head ${col.h}">
        <span class="kb-col-title">${col.l}</span>
        <span class="kb-col-count">${cs.length}</span>
      </div>
      <div class="kb-cards" id="ca${ci}" ondragover="dov(event,${ci})" ondrop="ddp(event,${ci})" ondragleave="dol(event,${ci})">
        ${cs.map(c=>cardHTML(c)).join('')}
        <div class="dz" id="dz${ci}">Soltar aqui</div>
      </div>
      <button class="add-card-btn" onclick="openModal(${ci})">+ Adicionar vaga</button>`;
    b.appendChild(d);
  });
  document.querySelectorAll('.kb-card').forEach(el=>{
    el.addEventListener('dragstart',()=>{drag=+el.dataset.id;setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.dz').forEach(z=>z.classList.remove('on'));});
  });
}

function dov(e,ci){e.preventDefault();document.getElementById('dz'+ci).classList.add('on');}
function dol(e,ci){if(!e.currentTarget.contains(e.relatedTarget))document.getElementById('dz'+ci).classList.remove('on');}
function ddp(e,ci){e.preventDefault();if(drag!==null){const c=cards.find(x=>x.id===drag);if(c){c.col=ci;c.etapa=COLS[ci].l;if(ci===4&&!c.fechamento)c.fechamento=today();}drag=null;renderKanban();renderDash();}}

// ── MODAL ──
function openModal(ci){
  ['f-vaga','f-area','f-unidade','f-cidade','f-gestor','f-diretor','f-just','f-obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-quant').value=1;
  document.getElementById('f-tipo').value='Nova';
  document.getElementById('f-ct').value='CLT';
  document.getElementById('f-abertura').value=today();
  document.getElementById('f-etapa').value=ci;
  document.getElementById('modal-title').textContent='Nova vaga — '+COLS[ci].l;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function saveCard(){
  const v=document.getElementById('f-vaga').value.trim();
  if(!v)return;
  const ci=+document.getElementById('f-etapa').value;
  cards.push({id:nextId++,vaga:v,
    area:document.getElementById('f-area').value.trim()||'—',
    responsavel:document.getElementById('f-resp').value,
    etapa:COLS[ci].l,
    tipo:document.getElementById('f-tipo').value,
    contratacao:document.getElementById('f-ct').value,
    unidade:document.getElementById('f-unidade').value.trim(),
    cidade:document.getElementById('f-cidade').value.trim(),
    diretor:document.getElementById('f-diretor').value.trim(),
    gestor:document.getElementById('f-gestor').value.trim(),
    quant:+document.getElementById('f-quant').value||1,
    abertura:document.getElementById('f-abertura').value,
    fechamento:'',
    justificativa:document.getElementById('f-just').value.trim(),
    status:'Em andamento',
    obs:document.getElementById('f-obs').value.trim(),
    col:ci});
  closeModal();renderKanban();renderDash();
}
document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── DASHBOARD ──
function barChart(container, data, color){
  const max=Math.max(...data.map(d=>d.v),1);
  container.innerHTML=data.map(d=>`
    <div class="bar-row">
      <span class="bar-label" title="${d.l}">${d.l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.v/max*100)}%;background:${color}"></div></div>
      <span class="bar-num">${d.v}</span>
    </div>`).join('');
}

function renderDash(){
  const open=cards.filter(c=>c.col<4);
  const closed=cards.filter(c=>c.col===4&&c.status==='Vaga Fechada');
  const frozen=cards.filter(c=>c.status==='Congelada');
  const total=cards.length;

  // SLA médio para fechadas
  const slaVals=closed.filter(c=>c.abertura&&c.fechamento).map(c=>diffDays(c.abertura,c.fechamento)).filter(v=>v!==null&&v>0);
  const slaAvg=slaVals.length?Math.round(slaVals.reduce((a,b)=>a+b,0)/slaVals.length):0;

  // metrics
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total de vagas</div><div class="metric-val mv-total">${total}</div><div class="metric-sub">no pipeline</div></div>
    <div class="metric"><div class="metric-label">Em andamento</div><div class="metric-val mv-open">${open.length}</div><div class="metric-sub">vagas abertas</div></div>
    <div class="metric"><div class="metric-label">Vagas fechadas</div><div class="metric-val mv-closed">${closed.length}</div><div class="metric-sub">encerradas</div></div>
    <div class="metric"><div class="metric-label">Congeladas</div><div class="metric-val mv-frozen">${frozen.length}</div><div class="metric-sub">aguardando</div></div>
    <div class="metric"><div class="metric-label">SLA médio</div><div class="metric-val mv-sla">${slaAvg}</div><div class="metric-sub">dias até fechamento</div></div>
    <div class="metric"><div class="metric-label">Vagas Novas</div><div class="metric-val mv-total">${cards.filter(c=>c.tipo==='Nova').length}</div><div class="metric-sub">headcount novo</div></div>
  `;

  // área
  const areas={};
  cards.forEach(c=>{if(c.area)areas[c.area]=(areas[c.area]||0)+1;});
  const areaData=Object.entries(areas).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([l,v])=>({l,v}));
  barChart(document.getElementById('chart-area'),areaData,'#004474');

  // funil (abertas)
  const funnel=COLS.slice(0,4).map((col,ci)=>({l:col.l,v:open.filter(c=>c.col===ci).length}));
  const fmax=Math.max(...funnel.map(f=>f.v),1);
  const fcolors=['#ED1E79','#00D2D4','#7c3aed','#059669'];
  document.getElementById('chart-funnel').innerHTML=funnel.map((f,i)=>`
    <div class="funnel-row">
      <span class="funnel-stage">${f.l}</span>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${Math.round(f.v/fmax*100)}%;background:${fcolors[i]}"></div>
        <span class="funnel-n">${f.v}</span>
      </div>
    </div>`).join('');

  // SLA table
  const slaRows=closed.filter(c=>c.abertura&&c.fechamento).map(c=>{
    const d=diffDays(c.abertura,c.fechamento);
    const cls=d<=30?'pill-ok':d<=45?'pill-warn':'pill-bad';
    const lbl=d<=30?'Ótimo':d<=45?'Regular':'Longo';
    return {vaga:c.vaga,d,cls,lbl};
  }).sort((a,b)=>b.d-a.d).slice(0,8);
  document.getElementById('chart-sla').innerHTML=`<table class="sla-table">
    <thead><tr><th>Vaga</th><th>Dias</th><th>SLA</th></tr></thead>
    <tbody>${slaRows.map(r=>`<tr>
      <td title="${r.vaga}">${r.vaga.length>28?r.vaga.slice(0,28)+'…':r.vaga}</td>
      <td>${r.d}</td>
      <td><span class="pill ${r.cls}">${r.lbl}</span></td>
    </tr>`).join('')}</tbody>
  </table>`;

  // responsável
  const am=cards.filter(c=>c.responsavel==='Amanda');
  const ra=cards.filter(c=>c.responsavel==='Rafaela');
  const rmax=Math.max(am.length,ra.length,1);
  document.getElementById('chart-resp').innerHTML=`
    <div class="resp-row">
      <div class="resp-avatar av-a">AM</div>
      <div class="resp-info"><div class="resp-name">Amanda</div><div class="resp-sub">${am.filter(c=>c.col<4).length} abertas · ${am.filter(c=>c.col===4).length} fechadas</div></div>
      <div class="resp-track"><div class="resp-fill rf-a" style="width:${Math.round(am.length/rmax*100)}%"></div></div>
      <span class="resp-pct">${am.length}</span>
    </div>
    <div class="resp-row">
      <div class="resp-avatar av-r">RA</div>
      <div class="resp-info"><div class="resp-name">Rafaela</div><div class="resp-sub">${ra.filter(c=>c.col<4).length} abertas · ${ra.filter(c=>c.col===4).length} fechadas</div></div>
      <div class="resp-track"><div class="resp-fill rf-r" style="width:${Math.round(ra.length/rmax*100)}%"></div></div>
      <span class="resp-pct">${ra.length}</span>
    </div>`;

  // por mês
  const months={};
  cards.forEach(c=>{if(!c.abertura)return;const m=c.abertura.slice(0,7);months[m]=(months[m]||0)+1;});
  const mData=Object.entries(months).sort().map(([l,v])=>({l:l.slice(5)+'/'+l.slice(2,4),v}));
  barChart(document.getElementById('chart-month'),mData,'#00D2D4');

  // CLT vs PJ
  const clt=cards.filter(c=>c.contratacao==='CLT').length;
  const pj=cards.filter(c=>c.contratacao==='PJ').length;
  const ctMax=Math.max(clt,pj,1);
  barChart(document.getElementById('chart-ct'),[{l:'CLT',v:clt},{l:'PJ',v:pj}],'#ED1E79');
}

// ── INIT ──
document.getElementById('updated-at').textContent='Atualizado em: '+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
renderKanban();
</script>
