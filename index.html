<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA — Kanban de Vagas 2026</title>
<style>
  :root{
    --navy:#004474;--navy2:#003360;--navy3:#e0eaf3;--navy4:#002a49;
    --cyan:#00D2D4;--cyan2:#00aaac;--cyan3:#e0fafa;
    --pink:#ED1E79;--pink2:#c01862;--pink3:#fde8f2;
    --gray1:#f7f7f7;--gray2:#ebebeb;--gray3:#aaa;--gray4:#555;--gray5:#333;
    --white:#fff;--radius:9px;--shadow:0 1px 4px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
  body{background:var(--gray1);color:var(--gray5);min-height:100vh;}

  .topbar{background:var(--navy);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:200;}
  .logo{display:flex;align-items:center;gap:8px;}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);}
  .logo-dot2{width:10px;height:10px;border-radius:50%;background:var(--pink);}
  .logo h1{font-size:15px;font-weight:600;color:#fff;letter-spacing:.3px;}
  .tabs{display:flex;gap:2px;margin-left:auto;}
  .tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.65);}
  .tab:hover{color:#fff;}
  .tab.active{background:rgba(255,255,255,.15);color:#fff;}
  .sync-info{font-size:11px;color:rgba(255,255,255,.45);margin-left:8px;white-space:nowrap;}
  .sync-btn{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.8);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;margin-left:6px;}
  .sync-btn:hover{background:rgba(255,255,255,.22);}

  .page{display:none;padding:1.25rem 1.5rem;}
  .page.active{display:block;}

  /* loading */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:1rem;}
  .spinner{width:36px;height:36px;border:3px solid var(--gray2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-size:13px;color:var(--gray3);}

  /* error */
  .error-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:1rem 1.25rem;color:#991b1b;font-size:13px;margin:1rem 0;}

  /* DASHBOARD */
  .dash-title{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.5px;}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem;}
  .metric{background:var(--white);border-radius:var(--radius);padding:1rem 1.1rem;box-shadow:var(--shadow);}
  .metric-label{font-size:10px;color:var(--gray3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
  .metric-val{font-size:28px;font-weight:700;line-height:1;margin-bottom:2px;}
  .metric-sub{font-size:10px;color:var(--gray3);}
  .mv-total{color:var(--navy);}
  .mv-open{color:var(--cyan2);}
  .mv-closed{color:var(--pink);}
  .mv-frozen{color:var(--gray3);}
  .mv-sla{color:#f59e0b;}

  .dash-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:700px){.dash-row{grid-template-columns:1fr;}}
  .chart-card{background:var(--white);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow);}
  .chart-card h3{font-size:11px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}

  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .bar-label{font-size:11px;color:var(--gray4);min-width:95px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar-track{flex:1;height:13px;background:var(--gray2);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;}
  .bar-num{font-size:11px;color:var(--gray4);min-width:20px;}

  .funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
  .funnel-stage{font-size:10px;color:var(--gray4);min-width:140px;}
  .funnel-bar-wrap{flex:1;display:flex;align-items:center;gap:6px;}
  .funnel-bar{height:15px;border-radius:4px;min-width:4px;}
  .funnel-n{font-size:11px;color:var(--gray4);}

  .sla-table{width:100%;border-collapse:collapse;font-size:11px;}
  .sla-table th{text-align:left;font-size:10px;color:var(--gray3);text-transform:uppercase;letter-spacing:.3px;padding:3px 6px;border-bottom:1px solid var(--gray2);}
  .sla-table td{padding:4px 6px;border-bottom:1px solid var(--gray2);color:var(--gray5);}
  .sla-table tr:last-child td{border-bottom:none;}
  .pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;}
  .pill-ok{background:#d1fae5;color:#065f46;}
  .pill-warn{background:#fef3c7;color:#92400e;}
  .pill-bad{background:#fee2e2;color:#991b1b;}

  .resp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .resp-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
  .av-a{background:var(--cyan2);}
  .av-r{background:var(--pink);}
  .resp-info{flex:1;}
  .resp-name{font-size:12px;font-weight:500;}
  .resp-sub{font-size:10px;color:var(--gray3);}
  .resp-track{flex:2;height:10px;background:var(--gray2);border-radius:4px;overflow:hidden;}
  .resp-fill{height:100%;border-radius:4px;}
  .rf-a{background:var(--cyan2);}
  .rf-r{background:var(--pink);}
  .resp-pct{font-size:11px;color:var(--gray4);min-width:28px;text-align:right;}

  /* KANBAN */
  .kb-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .kb-toolbar h2{font-size:14px;font-weight:600;color:var(--navy);margin-right:auto;}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--gray2);background:var(--white);font-size:11px;color:var(--gray4);cursor:pointer;font-weight:500;}
  .filter-btn:hover{border-color:var(--cyan);color:var(--navy);}
  .filter-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}

  .kb-wrap{overflow-x:auto;padding-bottom:1rem;}
  .kb-cols{display:flex;gap:10px;min-width:860px;}
  .kb-col{flex:1;min-width:162px;display:flex;flex-direction:column;gap:5px;}
  .kb-col-head{border-radius:8px 8px 0 0;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
  .kh0{background:var(--pink2);}
  .kh1{background:var(--cyan2);}
  .kh2{background:#7c3aed;}
  .kh3{background:#059669;}
  .kh4{background:var(--gray4);}
  .kb-col-title{font-size:11px;font-weight:600;color:#fff;line-height:1.3;}
  .kb-col-count{font-size:10px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.2);border-radius:10px;padding:1px 7px;}
  .kb-cards{display:flex;flex-direction:column;gap:5px;min-height:50px;padding:3px 0;}
  .kb-card{background:var(--white);border-radius:0 8px 8px 0;padding:9px 11px;box-shadow:var(--shadow);}
  .kc0{border-left:3px solid var(--pink);}
  .kc1{border-left:3px solid var(--cyan);}
  .kc2{border-left:3px solid #7c3aed;}
  .kc3{border-left:3px solid #059669;}
  .kc4{border-left:3px solid var(--gray3);opacity:.75;}
  .card-title{font-size:11px;font-weight:600;color:var(--gray5);line-height:1.35;margin-bottom:6px;}
  .card-dets{display:flex;flex-direction:column;gap:2px;margin-bottom:5px;}
  .card-dr{display:flex;gap:4px;font-size:10px;color:var(--gray3);line-height:1.4;}
  .card-badges{display:flex;flex-wrap:wrap;gap:3px;}
  .badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600;}
  .b-area{background:var(--navy3);color:var(--navy4);}
  .b-resp{background:var(--gray2);color:var(--gray4);}
  .b-nova{background:var(--cyan3);color:var(--cyan2);}
  .b-sub{background:var(--pink3);color:var(--pink2);}
  .b-clt{background:#f0f0f0;color:#555;}
  .b-pj{background:#fff7ed;color:#c2410c;}
  .b-qt{background:var(--navy3);color:var(--navy4);}
  .card-obs{font-size:9px;color:var(--pink2);background:var(--pink3);border-radius:4px;padding:2px 6px;margin-top:4px;}
  .sla-alert{font-size:9px;border-radius:4px;padding:2px 6px;margin-top:4px;}
  .sla-red{background:#fee2e2;color:#991b1b;}
  .sla-yellow{background:#fef3c7;color:#92400e;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-dot2"></div>
    <h1>ISA · Vagas 2026</h1>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('kanban',this)">Kanban</button>
    <button class="tab" onclick="showPage('dashboard',this)">Dashboard</button>
  </div>
  <span class="sync-info" id="sync-info">Carregando...</span>
  <button class="sync-btn" onclick="loadData()">↻ Atualizar</button>
</div>

<div class="page active" id="page-kanban">
  <div class="kb-toolbar">
    <h2>Pipeline de Vagas</h2>
    <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('Amanda',this)">Amanda</button>
    <button class="filter-btn" onclick="setFilter('Rafaela',this)">Rafaela</button>
  </div>
  <div id="kanban-loading" class="loading"><div class="spinner"></div><p>Carregando dados da planilha...</p></div>
  <div class="kb-wrap" id="kb-wrap" style="display:none">
    <div class="kb-cols" id="board"></div>
  </div>
</div>

<div class="page" id="page-dashboard">
  <div id="dash-loading" class="loading"><div class="spinner"></div><p>Carregando indicadores...</p></div>
  <div id="dash-content" style="display:none">
    <div class="dash-title">Indicadores de Recrutamento · 2026</div>
    <div class="metrics" id="metrics"></div>
    <div class="dash-row">
      <div class="chart-card"><h3>Vagas por área</h3><div id="chart-area"></div></div>
      <div class="chart-card"><h3>Funil por etapa (abertas)</h3><div id="chart-funnel"></div></div>
    </div>
    <div class="dash-row">
      <div class="chart-card"><h3>SLA de fechamento (dias até fechar)</h3><div id="chart-sla"></div></div>
      <div class="chart-card"><h3>Distribuição por responsável</h3><div id="chart-resp"></div></div>
    </div>
    <div class="dash-row">
      <div class="chart-card"><h3>Vagas abertas por mês</h3><div id="chart-month"></div></div>
      <div class="chart-card"><h3>CLT vs PJ</h3><div id="chart-ct"></div></div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPaarT7s-cvpwpO1Q66LZ9uEeL5E_bgWoNrMHQh-1B9daA_Ci4xxkKgxrYh2WshQ/pub?output=csv';

const COLS=[
  {l:'Divulgação / Hunting', h:'kh0', lc:'kc0'},
  {l:'Entrevista G&G',       h:'kh1', lc:'kc1'},
  {l:'Avaliação Técnica',    h:'kh2', lc:'kc2'},
  {l:'Proposta e Contratação',h:'kh3',lc:'kc3'},
  {l:'Fechadas / Congeladas', h:'kh4', lc:'kc4'},
];

const ETAPA_MAP={
  'divulgação/hunting':0,'divulgacao/hunting':0,'divulgação / hunting':0,
  'entrevista g&g':1,'entrevista gg':1,
  'avaliação técnica':2,'avaliacao tecnica':2,
  'proposta e contratação':3,'proposta e contratacao':3,
  'vaga fechada':4,'fechada':4,'vaga congelada':4,'congelada':4,
};

let allCards=[], filterResp='todos', currentPage='kanban';

// ── CSV PARSER ──
function parseCSV(text){
  const lines=text.split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i];
    if(!line.trim()) continue;
    const vals=[];
    let cur='',inQ=false;
    for(let c=0;c<line.length;c++){
      if(line[c]==='"'){inQ=!inQ;}
      else if(line[c]===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=line[c];
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
    rows.push(obj);
  }
  return rows;
}

function findCol(obj, ...keys){
  for(const k of keys){
    for(const ok of Object.keys(obj)){
      if(ok.toLowerCase().includes(k.toLowerCase())&&obj[ok]) return obj[ok];
    }
  }
  return '';
}

function mapToCard(row, idx){
  const etapa=findCol(row,'etapa');
  const status=findCol(row,'status');
  const etapaKey=(etapa||status||'').toLowerCase().trim();
  let col=ETAPA_MAP[etapaKey];
  if(col===undefined){
    if(etapaKey.includes('fecha')||etapaKey.includes('congel')) col=4;
    else if(etapaKey.includes('proposta')||etapaKey.includes('contrat')) col=3;
    else if(etapaKey.includes('avaliaç')||etapaKey.includes('tecnica')||etapaKey.includes('técnica')) col=2;
    else if(etapaKey.includes('g&g')||etapaKey.includes('entrevista')) col=1;
    else col=0;
  }
  const qtStr=findCol(row,'quant');
  const qt=parseInt(qtStr)||1;
  return {
    id:idx+1,
    vaga:findCol(row,'vaga aberta','vaga','cargo'),
    area:findCol(row,'area','área'),
    responsavel:findCol(row,'responsável','responsavel','resp'),
    etapa,
    tipo:findCol(row,'tipo de vaga','tipo'),
    contratacao:findCol(row,'tipo de contrat','contrat'),
    unidade:findCol(row,'unidade'),
    cidade:findCol(row,'cidade'),
    gestor:findCol(row,'gestor','23'),
    diretor:findCol(row,'diretor'),
    quant:qt,
    abertura:findCol(row,'data abertura','abertura'),
    fechamento:findCol(row,'data fechamento','fechamento'),
    justificativa:findCol(row,'justificativa'),
    status:findCol(row,'status atual','status'),
    obs:findCol(row,'observ'),
    col,
  };
}

// ── LOAD ──
async function loadData(){
  document.getElementById('sync-info').textContent='Sincronizando...';
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    if(text.includes('<!DOCTYPE')||text.includes('<html')) throw new Error('Planilha não pública');
    const rows=parseCSV(text);
    allCards=rows.filter(r=>findCol(r,'vaga aberta','vaga','cargo')).map((r,i)=>mapToCard(r,i));
    const now=new Date();
    document.getElementById('sync-info').textContent='Atualizado às '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    showLoaded();
  }catch(err){
    document.getElementById('sync-info').textContent='Erro ao carregar';
    document.getElementById('kanban-loading').innerHTML=`<div class="error-box">Não foi possível carregar a planilha.<br><small>${err.message}</small><br><br><button onclick="loadData()" style="margin-top:8px;padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;cursor:pointer;">Tentar novamente</button></div>`;
    console.error(err);
  }
}

function showLoaded(){
  document.getElementById('kanban-loading').style.display='none';
  document.getElementById('kb-wrap').style.display='block';
  document.getElementById('dash-loading').style.display='none';
  document.getElementById('dash-content').style.display='block';
  renderKanban();
  if(currentPage==='dashboard') renderDash();
}

// ── PAGE ──
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  currentPage=name;
  if(name==='dashboard'&&allCards.length) renderDash();
}

// ── FILTER ──
function setFilter(v,btn){
  filterResp=v;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderKanban();
}

// ── UTILS ──
function fd(s){if(!s||s==='NaT')return '';try{const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('pt-BR');}catch(e){return s;}}
function diffDays(a,b){try{return Math.round((new Date(b)-new Date(a))/86400000);}catch(e){return null;}}
function today(){return new Date().toISOString().slice(0,10);}
function daysOpen(c){const end=c.fechamento&&c.fechamento!=='NaT'?c.fechamento:today();return diffDays(c.abertura,end);}

// ── KANBAN ──
function renderKanban(){
  const vis=filterResp==='todos'?allCards:allCards.filter(c=>c.responsavel===filterResp);
  const b=document.getElementById('board');
  b.innerHTML='';
  COLS.forEach((col,ci)=>{
    const cs=vis.filter(c=>c.col===ci);
    const d=document.createElement('div');
    d.className='kb-col';
    d.innerHTML=`
      <div class="kb-col-head ${col.h}">
        <span class="kb-col-title">${col.l}</span>
        <span class="kb-col-count">${cs.length}</span>
      </div>
      <div class="kb-cards">${cs.map(c=>cardHTML(c,ci)).join('')}</div>`;
    b.appendChild(d);
  });
}

function cardHTML(c,ci){
  const ab=fd(c.abertura),fc=fd(c.fechamento);
  const days=daysOpen(c);
  let slaTag='';
  if(ci<4&&days!==null){
    if(days>45) slaTag=`<div class="sla-alert sla-red">⚠ ${days} dias em aberto</div>`;
    else if(days>30) slaTag=`<div class="sla-alert sla-yellow">🕐 ${days} dias em aberto</div>`;
  }
  return `<div class="kb-card ${COLS[ci].lc}">
    <div class="card-title">${c.vaga||'—'}</div>
    <div class="card-dets">
      ${ab?`<div class="card-dr"><span>📅</span><span>Abertura: ${ab}</span></div>`:''}
      ${fc?`<div class="card-dr"><span>✅</span><span>Fechamento: ${fc}</span></div>`:''}
      ${c.unidade?`<div class="card-dr"><span>📍</span><span>${c.unidade}${c.cidade&&c.cidade!==c.unidade?' — '+c.cidade:''}</span></div>`:''}
      ${c.gestor?`<div class="card-dr"><span>👤</span><span>Gestor: ${c.gestor}</span></div>`:''}
      ${c.justificativa?`<div class="card-dr"><span>📝</span><span>${c.justificativa}</span></div>`:''}
    </div>
    <div class="card-badges">
      ${c.area?`<span class="badge b-area">${c.area}</span>`:''}
      ${c.responsavel?`<span class="badge b-resp">${c.responsavel}</span>`:''}
      ${c.tipo==='Nova'?'<span class="badge b-nova">Nova</span>':c.tipo==='Substituição'?'<span class="badge b-sub">Subst.</span>':''}
      ${c.contratacao==='CLT'?'<span class="badge b-clt">CLT</span>':c.contratacao==='PJ'?'<span class="badge b-pj">PJ</span>':''}
      ${c.quant>1?`<span class="badge b-qt">${c.quant} vagas</span>`:''}
    </div>
    ${c.obs?`<div class="card-obs">${c.obs}</div>`:''}
    ${slaTag}
  </div>`;
}

// ── DASHBOARD ──
function barChart(el,data,color){
  const max=Math.max(...data.map(d=>d.v),1);
  el.innerHTML=data.map(d=>`<div class="bar-row">
    <span class="bar-label" title="${d.l}">${d.l}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.v/max*100)}%;background:${color}"></div></div>
    <span class="bar-num">${d.v}</span>
  </div>`).join('');
}

function renderDash(){
  const open=allCards.filter(c=>c.col<4);
  const closed=allCards.filter(c=>c.col===4&&(c.status||'').toLowerCase().includes('fecha'));
  const frozen=allCards.filter(c=>(c.status||'').toLowerCase().includes('congel'));

  const slaVals=closed.filter(c=>c.abertura&&c.fechamento&&c.fechamento!=='NaT').map(c=>diffDays(c.abertura,c.fechamento)).filter(v=>v&&v>0);
  const slaAvg=slaVals.length?Math.round(slaVals.reduce((a,b)=>a+b,0)/slaVals.length):0;

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total de vagas</div><div class="metric-val mv-total">${allCards.length}</div><div class="metric-sub">no pipeline</div></div>
    <div class="metric"><div class="metric-label">Em andamento</div><div class="metric-val mv-open">${open.length}</div><div class="metric-sub">vagas abertas</div></div>
    <div class="metric"><div class="metric-label">Fechadas</div><div class="metric-val mv-closed">${closed.length}</div><div class="metric-sub">encerradas</div></div>
    <div class="metric"><div class="metric-label">Congeladas</div><div class="metric-val mv-frozen">${frozen.length}</div><div class="metric-sub">aguardando</div></div>
    <div class="metric"><div class="metric-label">SLA médio</div><div class="metric-val mv-sla">${slaAvg}</div><div class="metric-sub">dias até fechamento</div></div>
    <div class="metric"><div class="metric-label">Vagas novas</div><div class="metric-val mv-total">${allCards.filter(c=>c.tipo==='Nova').length}</div><div class="metric-sub">headcount novo</div></div>
  `;

  const areas={};
  allCards.forEach(c=>{if(c.area)areas[c.area]=(areas[c.area]||0)+1;});
  barChart(document.getElementById('chart-area'),Object.entries(areas).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([l,v])=>({l,v})),'#004474');

  const fcolors=['#ED1E79','#00D2D4','#7c3aed','#059669'];
  const fmax=Math.max(...COLS.slice(0,4).map((_,ci)=>open.filter(c=>c.col===ci).length),1);
  document.getElementById('chart-funnel').innerHTML=COLS.slice(0,4).map((col,ci)=>{
    const v=open.filter(c=>c.col===ci).length;
    return `<div class="funnel-row">
      <span class="funnel-stage">${col.l}</span>
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="width:${Math.round(v/fmax*100)}%;background:${fcolors[ci]}"></div>
        <span class="funnel-n">${v}</span>
      </div>
    </div>`;
  }).join('');

  const slaRows=closed.filter(c=>c.abertura&&c.fechamento&&c.fechamento!=='NaT').map(c=>{
    const d=diffDays(c.abertura,c.fechamento);
    return{vaga:c.vaga,d,cls:d<=30?'pill-ok':d<=45?'pill-warn':'pill-bad',lbl:d<=30?'Ótimo':d<=45?'Regular':'Longo'};
  }).filter(r=>r.d&&r.d>0).sort((a,b)=>b.d-a.d).slice(0,8);
  document.getElementById('chart-sla').innerHTML=`<table class="sla-table">
    <thead><tr><th>Vaga</th><th>Dias</th><th>SLA</th></tr></thead>
    <tbody>${slaRows.map(r=>`<tr>
      <td title="${r.vaga}">${r.vaga&&r.vaga.length>30?r.vaga.slice(0,30)+'…':r.vaga||'—'}</td>
      <td>${r.d}</td><td><span class="pill ${r.cls}">${r.lbl}</span></td>
    </tr>`).join('')}</tbody>
  </table>`;

  const am=allCards.filter(c=>c.responsavel==='Amanda');
  const ra=allCards.filter(c=>c.responsavel==='Rafaela');
  const rmax=Math.max(am.length,ra.length,1);
  document.getElementById('chart-resp').innerHTML=`
    <div class="resp-row">
      <div class="resp-avatar av-a">AM</div>
      <div class="resp-info"><div class="resp-name">Amanda</div><div class="resp-sub">${am.filter(c=>c.col<4).length} abertas · ${am.filter(c=>c.col===4).length} fechadas</div></div>
      <div class="resp-track"><div class="resp-fill rf-a" style="width:${Math.round(am.length/rmax*100)}%"></div></div>
      <span class="resp-pct">${am.length}</span>
    </div>
    <div class="resp-row">
      <div class="resp-avatar av-r">RA</div>
      <div class="resp-info"><div class="resp-name">Rafaela</div><div class="resp-sub">${ra.filter(c=>c.col<4).length} abertas · ${ra.filter(c=>c.col===4).length} fechadas</div></div>
      <div class="resp-track"><div class="resp-fill rf-r" style="width:${Math.round(ra.length/rmax*100)}%"></div></div>
      <span class="resp-pct">${ra.length}</span>
    </div>`;

  const months={};
  allCards.forEach(c=>{if(!c.abertura||c.abertura==='NaT')return;const m=(c.abertura||'').slice(0,7);if(m)months[m]=(months[m]||0)+1;});
  barChart(document.getElementById('chart-month'),Object.entries(months).sort().map(([l,v])=>({l:l.slice(5)+'/'+l.slice(2,4),v})),'#00D2D4');

  const clt=allCards.filter(c=>c.contratacao==='CLT').length;
  const pj=allCards.filter(c=>c.contratacao==='PJ').length;
  barChart(document.getElementById('chart-ct'),[{l:'CLT',v:clt},{l:'PJ',v:pj}],'#ED1E79');
}

// ── INIT ──
loadData();
// Auto-refresh a cada 5 minutos
setInterval(()=>{loadData();},5*60*1000);
</script>
</body>
</html>
